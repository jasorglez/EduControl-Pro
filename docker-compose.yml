services:
  educontrol:
    build: .
    container_name: educontrol-pro
    restart: unless-stopped
    ports:
      - "8060:80"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      # Archivo sensible — NO está en git, se copia manualmente al servidor
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
